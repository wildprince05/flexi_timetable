spring.application.name=timetable-backend

# Database - H2 In-Memory
spring.datasource.url=jdbc:h2:mem:timetable_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT settings
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expirationMs=86400000

# Server port setup
server.port=8080

# CORS settings for frontend
spring.mvc.cors.mappings[/**].allowed-origins=http://localhost:5173
spring.mvc.cors.mappings[/**].allowed-methods=GET, POST, PUT, DELETE, OPTIONS
spring.mvc.cors.mappings[/**].allowed-headers=*
spring.mvc.cors.mappings[/**].allow-credentials=true
